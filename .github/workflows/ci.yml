name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint and type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      # According to https://docs.astral.sh/uv/guides/integration/github/#setting-up-python
      # This can be faster, because GitHub caches the Python versions alongside the runner.
      - name: "Set up Python"
        uses: actions/setup-python@v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run linter
        run: uv run ruff check

      - name: Check formatting
        run: uv run ruff format --check

      - name: Run type checker
        run: uv run pyright

      # Guards the pre-push tooling (scripts/pre-push-checks.sh and its
      # Claude Code adapter), which mirrors this job's checks — hermetic,
      # needs only bash + git + python3.
      - name: Run pre-push tooling tests
        run: scripts/pre-push-checks_test.sh

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: "Set up Python"
        uses: actions/setup-python@v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest

  # NOTE: mirrored by scripts/pre-push-checks.sh's immich-version-sync
  # check — update both.
  check-immich-version-sync:
    name: Check Immich version sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Verify .immich-container-tag matches Dockerfile ARG
        run: |
          TAG=$(cat .immich-container-tag)
          DOCKERFILE_VERSION=$(grep -E '^ARG IMMICH_VERSION=' Dockerfile | cut -d= -f2)
          if [ "$TAG" != "$DOCKERFILE_VERSION" ]; then
            echo "::error::Mismatch: .immich-container-tag=$TAG but Dockerfile ARG IMMICH_VERSION=$DOCKERFILE_VERSION. See docs/references/code-practices.md § 'Bumping the Immich Version'."
            exit 1
          fi
